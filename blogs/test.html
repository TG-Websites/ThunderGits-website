<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Insightful Horizons | Blog Detail</title>
  <!-- Tailwind CSS v3 + Font Awesome Icons + Inter Font -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Customizing Tailwind theme to be more professional (colors, font) -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'sans': ['Inter', 'system-ui', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'sans-serif'],
          },
          colors: {
            primary: '#0f172a',     // deep slate for elegance
            secondary: '#334155',
            accent: '#3b82f6',      // clean blue for CTAs
            softgray: '#f8fafc',
            cardborder: '#e2e8f0',
          },
          spacing: {
            '18': '4.5rem',
          },
          maxWidth: {
            'prose': '65ch',
          },
          boxShadow: {
            'soft': '0 10px 40px -12px rgba(0, 0, 0, 0.08), 0 4px 12px -6px rgba(0, 0, 0, 0.02)',
            'hover': '0 20px 35px -12px rgba(0, 0, 0, 0.12)',
          }
        }
      }
    }
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* subtle smooth scroll & focus outline improvements */
    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: #f9fafb;
    }

    /* custom prose styling for blog content (clean reading) */
    .blog-content p {
      margin-bottom: 1.25rem;
      line-height: 1.7;
      color: #1e293b;
    }

    .blog-content h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 2rem;
      margin-bottom: 1rem;
      letter-spacing: -0.01em;
      color: #0f172a;
    }

    .blog-content h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
      color: #1e293b;
    }

    .blog-content blockquote {
      border-left: 4px solid #3b82f6;
      padding-left: 1.5rem;
      font-style: italic;
      margin: 1.75rem 0;
      color: #334155;
      background-color: #f1f5f9;
      padding: 1rem 1.5rem;
      border-radius: 1rem;
      font-weight: 400;
    }

    .blog-content ul,
    .blog-content ol {
      margin-bottom: 1.25rem;
      padding-left: 1.5rem;
      color: #1e293b;
    }

    .blog-content li {
      margin-bottom: 0.4rem;
    }

    .blog-content a {
      color: #3b82f6;
      text-decoration: underline;
      text-underline-offset: 4px;
      font-weight: 500;
    }

    .blog-content img {
      border-radius: 1rem;
      margin: 1.8rem 0;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
    }

    /* custom scrollbar for modern look */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #e2e8f0;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: #94a3b8;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #5b6e8c;
    }
  </style>
</head>

<body class="font-sans antialiased">


  
  
 

  <!-- Mobile menu toggle script -->
  <script>
      (function () {
        const menuBtn = document.getElementById('mobileMenuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        if (menuBtn && mobileMenu) {
          menuBtn.addEventListener('click', function () {
            mobileMenu.classList.toggle('hidden');
            const icon = menuBtn.querySelector('i');
            if (icon) {
              if (mobileMenu.classList.contains('hidden')) {
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
              } else {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-times');
              }
            }
          });
        }
      })();
  </script>
</body>

</html>
